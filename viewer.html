<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AIMS Review - PDF Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: #1e293b; border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: #93c5fd; }
  .header .meta { font-size: 12px; color: #94a3b8; }

  .tabs {
    display: flex; gap: 2px; padding: 6px 16px 0; background: #1e293b;
    flex-shrink: 0; overflow-x: auto;
  }
  .tab {
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    background: #334155; color: #94a3b8; border: none;
    border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { background: #475569; color: #e2e8f0; }
  .tab.active { background: #0f172a; color: #60a5fa; }

  .viewer { flex: 1; position: relative; }
  .viewer iframe, .viewer embed {
    width: 100%; height: 100%; border: none;
    position: absolute; top: 0; left: 0;
  }

  .empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #64748b; font-size: 18px; flex-direction: column; gap: 12px;
  }
  .empty p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.5; }

  .kbd { display: inline-block; background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-family: monospace; }
  .shortcuts { font-size: 11px; color: #64748b; display: flex; gap: 16px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="candidateName">Loading...</h1>
    <span class="meta" id="meta"></span>
  </div>
  <div class="shortcuts">
    <span><span class="kbd">←</span> <span class="kbd">→</span> switch docs</span>
    <span><span class="kbd">1-9</span> jump to doc</span>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="viewer" id="viewer">
  <div class="empty">
    <div>📄</div>
    <p>No review data found. Click the <strong>"Download All PDFs & Open Viewer"</strong> button on a review page first.</p>
  </div>
</div>

<script>
  let currentIdx = 0;
  let pdfs = [];

  function renderTab(idx) {
    currentIdx = idx;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    const viewer = document.getElementById('viewer');
    viewer.innerHTML = '';
    const embed = document.createElement('embed');
    embed.src = pdfs[idx].url;
    embed.type = 'application/pdf';
    viewer.appendChild(embed);
  }

  function init(data) {
    pdfs = data.pdfs;
    document.getElementById('candidateName').textContent = `Application ${data.appNum}`;
    document.getElementById('meta').textContent = `${pdfs.length} documents`;

    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    pdfs.forEach((pdf, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.textContent = pdf.type.replace(/_/g, ' ');
      btn.addEventListener('click', () => renderTab(i));
      tabsEl.appendChild(btn);
    });

    if (pdfs.length > 0) renderTab(0);
  }

  document.addEventListener('keydown', (e) => {
    if (pdfs.length === 0) return;
    if (e.key === 'ArrowRight') {
      renderTab((currentIdx + 1) % pdfs.length);
    } else if (e.key === 'ArrowLeft') {
      renderTab((currentIdx - 1 + pdfs.length) % pdfs.length);
    } else if (e.key >= '1' && e.key <= '9') {
      const idx = parseInt(e.key) - 1;
      if (idx < pdfs.length) renderTab(idx);
    }
  });

  // Load metadata from storage
  chrome.storage.local.get('currentReview', (result) => {
    if (chrome.runtime.lastError) {
      document.getElementById('candidateName').textContent = 'Error';
      document.getElementById('meta').textContent = chrome.runtime.lastError.message;
      return;
    }
    if (result.currentReview && result.currentReview.pdfs && result.currentReview.pdfs.length > 0) {
      init(result.currentReview);
    } else {
      document.getElementById('candidateName').textContent = 'No data';
      document.getElementById('meta').textContent = 'Click the download button on a review page first';
    }
  });
</script>

</body>
</html>
